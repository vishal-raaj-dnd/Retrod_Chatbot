services:
  - type: web
    name: retrod-chatbot
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py ingest_knowledge
    startCommand: gunicorn retrod_backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
