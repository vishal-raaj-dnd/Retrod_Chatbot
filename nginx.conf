# Nginx Reverse Proxy Gateway Configuration

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone for WhatsApp webhook protection (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

    upstream django_app {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # Static file serving
        location /static/ {
            alias /app/static/;
        }

        # Media file uploads (Guest ID Proofs, etc.)
        location /media/ {
            alias /app/media/;
        }

        # WhatsApp Webhook Endpoint & API Gateway
        location /api/v1/integrations/whatsapp/webhook/ {
            limit_req zone=webhook_limit burst=20 nodelay;
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-all Proxy to Django Gunicorn Application
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
